<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBalancer Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-hover: #22222e;
            --border: #2a2a3a;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-green: #22c55e;
            --accent-green-dim: rgba(34, 197, 94, 0.15);
            --accent-red: #ef4444;
            --accent-red-dim: rgba(239, 68, 68, 0.15);
            --accent-yellow: #eab308;
            --accent-yellow-dim: rgba(234, 179, 8, 0.15);
            --accent-blue: #3b82f6;
            --accent-blue-dim: rgba(59, 130, 246, 0.15);
            --accent-purple: #a855f7;
            --accent-purple-dim: rgba(168, 85, 247, 0.15);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--accent-green-dim);
            border: 1px solid var(--accent-green);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent-green);
        }

        .status-badge.offline {
            background: var(--accent-red-dim);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 8px;
            color: var(--accent-green);
        }

        .stat-change.negative {
            color: var(--accent-red);
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
        }

        .card-body {
            padding: 24px;
        }

        /* Server List */
        .server-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .server-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto auto;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .server-item:hover {
            background: var(--bg-hover);
        }

        .server-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .server-status.online {
            background: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
        }

        .server-status.offline {
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
        }

        .server-info h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .server-info span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .server-stat {
            text-align: center;
            padding: 0 12px;
        }

        .server-stat-value {
            font-size: 16px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .server-stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-openai {
            background: var(--accent-green-dim);
            color: var(--accent-green);
        }

        .badge-anthropic {
            background: var(--accent-purple-dim);
            color: var(--accent-purple);
        }

        .badge-ollama {
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
        }

        /* Request Log */
        .request-log {
            max-height: 400px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-time {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-size: 11px;
            min-width: 70px;
        }

        .log-status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .log-status.success {
            background: var(--accent-green);
        }

        .log-status.error {
            background: var(--accent-red);
        }

        .log-model {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent-blue);
        }

        .log-latency {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Health Panel */
        .health-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .health-item {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px;
        }

        .health-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .health-item-name {
            font-size: 13px;
            font-weight: 500;
        }

        .health-item-status {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .health-item-status.healthy {
            background: var(--accent-green-dim);
            color: var(--accent-green);
        }

        .health-item-status.unhealthy {
            background: var(--accent-red-dim);
            color: var(--accent-red);
        }

        .health-item-latency {
            font-size: 20px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Refresh button */
        .btn-refresh {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-refresh:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .btn-refresh.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .server-item {
                grid-template-columns: auto 1fr;
                gap: 12px;
            }
            .server-stat {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div>
                    <h1>MindBalancer</h1>
                    <span>AI Load Balancer Dashboard</span>
                </div>
            </div>
            <div class="header-status">
                <div id="connectionStatus" class="status-badge">
                    <span class="status-dot"></span>
                    <span>Connected</span>
                </div>
                <button class="btn-refresh" onclick="refreshAll()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Servers</div>
                <div class="stat-value" id="totalServers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Healthy Servers</div>
                <div class="stat-value" id="healthyServers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Requests</div>
                <div class="stat-value" id="totalRequests">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Latency</div>
                <div class="stat-value" id="avgLatency">-</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Servers</h3>
                    <span id="algorithmBadge" class="badge badge-openai">weighted_round_robin</span>
                </div>
                <div class="card-body">
                    <div class="server-list" id="serverList">
                        <div class="empty-state">Loading servers...</div>
                    </div>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 24px;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Health Status</h3>
                    </div>
                    <div class="card-body">
                        <div class="health-grid" id="healthGrid">
                            <div class="empty-state">Loading...</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Recent Requests</h3>
                    </div>
                    <div class="card-body request-log" id="requestLog">
                        <div class="empty-state">No recent requests</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_API = 'http://127.0.0.1:6033';
        
        async function fetchStats() {
            try {
                const response = await fetch(`${ADMIN_API}/api/stats`);
                const data = await response.json();
                
                document.getElementById('totalServers').textContent = data.TotalServers || 0;
                document.getElementById('healthyServers').textContent = data.HealthyServers || 0;
                document.getElementById('algorithmBadge').textContent = data.Algorithm || 'unknown';
                
                // Calculate totals
                let totalReqs = 0;
                let totalLatency = 0;
                let latencyCount = 0;
                
                if (data.ServerStats) {
                    data.ServerStats.forEach(s => {
                        totalReqs += s.TotalReqs || 0;
                        if (s.AvgLatency > 0) {
                            totalLatency += s.AvgLatency;
                            latencyCount++;
                        }
                    });
                }
                
                document.getElementById('totalRequests').textContent = totalReqs.toLocaleString();
                
                if (latencyCount > 0) {
                    const avgMs = (totalLatency / latencyCount / 1000000).toFixed(0);
                    document.getElementById('avgLatency').textContent = avgMs + 'ms';
                } else {
                    document.getElementById('avgLatency').textContent = '-';
                }
                
                renderServers(data.ServerStats || []);
                
            } catch (error) {
                console.error('Failed to fetch stats:', error);
                setOffline();
            }
        }
        
        async function fetchHealth() {
            try {
                const response = await fetch(`${ADMIN_API}/api/health`);
                const data = await response.json();
                renderHealth(data);
            } catch (error) {
                console.error('Failed to fetch health:', error);
            }
        }
        
        async function fetchRequests() {
            try {
                const response = await fetch(`${ADMIN_API}/api/stats/requests?limit=10`);
                const data = await response.json();
                renderRequests(data || []);
            } catch (error) {
                console.error('Failed to fetch requests:', error);
            }
        }
        
        function renderServers(servers) {
            const container = document.getElementById('serverList');
            
            if (!servers || servers.length === 0) {
                container.innerHTML = '<div class="empty-state">No servers configured</div>';
                return;
            }
            
            container.innerHTML = servers.map(server => {
                const isHealthy = server.Errors === 0 || server.TotalReqs === 0;
                const latencyMs = server.AvgLatency > 0 ? (server.AvgLatency / 1000000).toFixed(0) : '-';
                const providerClass = getProviderClass(server.Name);
                
                return `
                    <div class="server-item">
                        <div class="server-status ${isHealthy ? 'online' : 'offline'}"></div>
                        <div class="server-info">
                            <h4>${server.Name}</h4>
                            <span>Hostgroup ${server.Hostgroup} • Weight ${server.Weight}</span>
                        </div>
                        <div class="server-stat">
                            <div class="server-stat-value">${server.TotalReqs}</div>
                            <div class="server-stat-label">Requests</div>
                        </div>
                        <div class="server-stat">
                            <div class="server-stat-value">${latencyMs}ms</div>
                            <div class="server-stat-label">Latency</div>
                        </div>
                        <span class="badge ${providerClass}">${getProviderName(server.Name)}</span>
                    </div>
                `;
            }).join('');
        }
        
        function renderHealth(healthData) {
            const container = document.getElementById('healthGrid');
            const entries = Object.entries(healthData);
            
            if (entries.length === 0) {
                container.innerHTML = '<div class="empty-state">No health data</div>';
                return;
            }
            
            container.innerHTML = entries.map(([name, status]) => {
                const latencyMs = status.Latency > 0 ? (status.Latency / 1000000).toFixed(0) : '-';
                return `
                    <div class="health-item">
                        <div class="health-item-header">
                            <span class="health-item-name">${name}</span>
                            <span class="health-item-status ${status.Healthy ? 'healthy' : 'unhealthy'}">
                                ${status.Healthy ? 'Healthy' : 'Unhealthy'}
                            </span>
                        </div>
                        <div class="health-item-latency">${latencyMs}ms</div>
                    </div>
                `;
            }).join('');
        }
        
        function renderRequests(requests) {
            const container = document.getElementById('requestLog');
            
            if (!requests || requests.length === 0) {
                container.innerHTML = '<div class="empty-state">No recent requests</div>';
                return;
            }
            
            container.innerHTML = requests.map(req => {
                const time = new Date(req.Timestamp).toLocaleTimeString('en-US', { 
                    hour12: false, 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'
                });
                const isSuccess = req.StatusCode >= 200 && req.StatusCode < 400;
                
                return `
                    <div class="log-item">
                        <span class="log-time">${time}</span>
                        <span class="log-status ${isSuccess ? 'success' : 'error'}"></span>
                        <span class="log-model">${req.Model || 'unknown'}</span>
                        <span>${req.ServerName || '-'}</span>
                        <span class="log-latency">${req.LatencyMS}ms</span>
                    </div>
                `;
            }).join('');
        }
        
        function getProviderClass(name) {
            if (name.includes('openai')) return 'badge-openai';
            if (name.includes('anthropic') || name.includes('claude')) return 'badge-anthropic';
            if (name.includes('ollama')) return 'badge-ollama';
            return 'badge-openai';
        }
        
        function getProviderName(name) {
            if (name.includes('openai')) return 'OpenAI';
            if (name.includes('anthropic') || name.includes('claude')) return 'Anthropic';
            if (name.includes('ollama')) return 'Ollama';
            if (name.includes('azure')) return 'Azure';
            if (name.includes('groq')) return 'Groq';
            return 'Custom';
        }
        
        function setOffline() {
            const status = document.getElementById('connectionStatus');
            status.className = 'status-badge offline';
            status.innerHTML = '<span class="status-dot"></span><span>Disconnected</span>';
        }
        
        function setOnline() {
            const status = document.getElementById('connectionStatus');
            status.className = 'status-badge';
            status.innerHTML = '<span class="status-dot"></span><span>Connected</span>';
        }
        
        async function refreshAll() {
            const btn = document.querySelector('.btn-refresh');
            btn.classList.add('loading');
            
            await Promise.all([
                fetchStats(),
                fetchHealth(),
                fetchRequests()
            ]);
            
            setOnline();
            btn.classList.remove('loading');
        }
        
        // Initial load
        refreshAll();
        
        // Auto-refresh every 5 seconds
        setInterval(refreshAll, 5000);
    </script>
</body>
</html>
