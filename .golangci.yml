# golangci-lint configuration for MindBalancer.
# Conservative, high-signal linter set — see https://golangci-lint.run
run:
  timeout: 5m
  go: '1.20'

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - misspell
    - gofmt

issues:
  exclude-rules:
    # Test files may ignore some errors for brevity.
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
